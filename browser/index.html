<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/style.css">
    <title>Control Panel with Output Logs</title>
</head>
<body>
    <div class="container">
        <div class="panel controls-panel">
            <h1>Brandon's Very Modern Image Visualizer</h1>
            
            <h2>Global Values </h2>
            <div id="globalTextBoxes">
                <!-- Text boxes will be added here by JavaScript -->
            </div>
            
            <h2>Sliders</h2>
            <div id="slidersContainer">
                <!-- Sliders will be added here by JavaScript -->
            </div>
        </div>
        
        <div class="panel outputs-panel">
            <h1>Output Logs</h1>
            <div id="outputLogsContainer">
                <!-- Output logs will be added here by JavaScript -->
            </div>
        </div>
    </div>

    <script src="static/server.js"></script>
</body>
</html>
