title:  "SD 1.5 — mean scale implementation DDIM"
output_dir: sweeps/ddim_2

examples:
  dataset: data/wild-ti2i
  indices : [5]

fixed:
  num_inference_steps: 50
  guidance_scale: 7.5

axes:
  noise_source:
    values: [random]

  projection:
    values: [orthonormal]

  dim_out:
    linspace: [3000, 12000, 4]

  nu:
    values: [1.0, 0.993, 0.9816, 0.9582, 0.9166, 0.8515, 0.7597, 0.6412, 0.4979, 0.3271, 0.0413, 0.0]

  mean_scale: 
    values: [ve]

  eta:
    values: [0.0, 0.5, 1.0]

  gate_type:
    values: [quadratic, heaviside]
