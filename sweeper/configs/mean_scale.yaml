title:  "SD 1.5 — mean scale implementation"
output_dir: sweeps/mean_scale

examples:
  dataset: data/wild-ti2i
  indices : [5]

fixed:
  num_inference_steps: 50
  guidance_scale: 7.5
  sampler: edm

axes:
  noise_source:
    values: [random]

  projection:
    values: [orthonormal]

  dim_out:
    linspace: [3000, 12000, 4]

  nu:
    values: [0.0292,   0.5717,   0.7762, 0.9,  1.0205,  1.3274,  1.7306,  1.9842,  2.2846, 2.6446]

  scale:
    values : [0.2, 0.5, 1.0, 2.0]

  gate_type:
    values: [quadratic, heaviside]
