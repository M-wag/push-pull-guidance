title:  "SD 1.5 — EDM abalation"
output_dir: sweeps/edm

examples:
  dataset: data/wild-ti2i
  indices : [5]

fixed:
  num_inference_steps: 50
  guidance_scale: 7.5
  sampler: edm

axes:
  noise_source:
    values: [random]

  projection:
    values: [orthonormal]

  dim_out:
    linspace: [1000, 12000, 13]

  nu:
    values: [0.0292,   0.5717,   0.7762,  1.0205,  1.3274,  1.7306,  1.9842,  2.2846, 2.6446]

  scale:
    values : [0.1, 0.2, 0.5, 1.0]

  gate_type:
    values: [quadratic, heaviside]
