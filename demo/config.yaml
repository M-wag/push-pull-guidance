title: "EDM ImageNet 64x64 — PPG Pullback Encoder Sweep"

output_dir: demo/sweeps/pushpull
baseline_dir: demo/sweeps/baselines

model:
  type: edm

examples:
  samples_yaml: data/imgnet64/my_samples.yaml
  n_entries : 10
  n_seeds : 4
  
snapshots:
  enabled: true
  steps: [1, 4, 7, 10, 13, 16, 19, 22, 25, 28, 31]

noise_source: random
max_batch_size: 12

solver:
  num_steps: 32
  stochastic: true
  second_order: true
  solver_seed: 314

ppg:
  mean_scale: ve
  normalize_variance: 
    values: [decomposed]
  gate:
    type: hill
    nu:
      values: [25.45, 13.26, 10.52, 6.46, 5.0, 2.9, 2.17, 1.61, 0.84]
    n:
      values: [.inf]

maps:
  - type: interpolation
    shape_in: [64,64]
    antialias: true
    shape_out: [128, 128]
  - type: nonlinear
    map_type: hf
    map_kwargs:
      autoencoder: kl
      name: runwayml/stable-diffusion-v1-5
      compile: true
      half_precision: true
      # compile_mode: max-autotune
    pullback:
      variants:
        values: 
          - {type: numdiff, kwargs: {step_size_slope: 1, step_size_intercept: 0}}

